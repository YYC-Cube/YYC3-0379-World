# Locust 配置文件
# 文件: locust.conf

# 主机配置
host = https://api.0379.world

# 用户配置
users = 100
spawn-rate = 10

# 运行时间
run-time = 5m

# 日志配置
loglevel = INFO
logfile = logs/locust.log

# HTML 报告
html = results/locust-report.html

# CSV 导出
csv = results/locust-results

# 仅运行指定类
# only-summary = false

# 无头模式（无 Web UI）
headless = true

# 步骤配置（逐步增加用户）
step-load = true
step-users = 20
step-time = 1m
