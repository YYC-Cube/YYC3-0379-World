version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:?must_set_ZHIPU_API_KEY}
      - MCP_DB_HOST=host.docker.internal
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:?must_set_DB_PASSWORD}@host.docker.internal:5433/yyc3_mcp
    ports:
      - "8000:8000"
    networks:
      - backend
    volumes:
      - ./data:/app/data
      - ../config/mcp_config.json:/app/config/mcp_config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  backend:
    driver: bridge

volumes:
  data: