# @tags docker,compose,traefik,fastapi,ollama,postgres,redis,monitoring,stable

version: "3.9"

networks:
  backend:
    driver: bridge

services:
  # ---------- 1️⃣ PostgreSQL ----------
  postgres:
    image: postgres:15-alpine
    platform: linux/arm64/v8
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: yyc3_gpt
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - ~/mnt/postgres/pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yyc3_gpt"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------- 2️⃣ Redis ----------
  redis:
    image: redis:7-alpine
    platform: linux/arm64/v8
    restart: unless-stopped
    env_file:
      - ../.env
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--appendonly", "yes"]
    volumes:
      - ~/mnt/redis:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------- 3️⃣ Ollama 本地 ----------
  ollama:
    image: ollama/ollama:latest
    platform: linux/arm64/v8
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_MODELS: ${OLLAMA_MODELS}
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - ~/mnt/models:/mnt/models
    ports:
      - "11435:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # ---------- 3.5️⃣ Node Exporter 系统监控 ----------
  node-exporter:
    image: prom/node-exporter:latest
    platform: linux/arm64/v8
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend

  # ---------- 3.6️⃣ PostgreSQL Exporter 数据库监控 ----------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    platform: linux/arm64/v8
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/yyc3_gpt?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/postgres-exporter/queries.yml"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9187/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  # ---------- 3.7️⃣ Redis Exporter 缓存监控 ----------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    platform: linux/arm64/v8
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_EXPORTER_LOG_FORMAT: "txt"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9121/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  # ---------- 4️⃣ FastAPI 网关 ----------
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    platform: linux/arm64/v8
    restart: unless-stopped
    env_file:
      - ../.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`api.0379.world`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls=true"
      - "traefik.http.routers.gateway.tls.certresolver=cloudflare"
      - "traefik.http.routers.gateway.middlewares=securityHeaders@file,rateLimiter@file,authBasic@file,circuitBreaker@file,requestLogging@file"
      - "traefik.http.services.gateway.loadbalancer.server.port=8000"
      - "traefik.http.services.gateway.loadbalancer.healthcheck.path=/v1/ping"
      - "traefik.http.services.gateway.loadbalancer.healthcheck.interval=10s"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------- 5️⃣ Traefik 入口 ----------
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../config/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ../config/traefik/acme.json:/acme.json
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@0379.email}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  # ---------- 6️⃣ 监控栈 ----------
  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64/v8
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ~/mnt/prometheus:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  grafana:
    image: grafana/grafana-oss:latest
    platform: linux/arm64/v8
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - ~/mnt/grafana:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  loki:
    image: grafana/loki:2.9.2
    platform: linux/arm64/v8
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - ~/mnt/loki:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  alertmanager:
    image: prom/alertmanager:latest
    platform: linux/arm64/v8
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/config.yml:ro
      - ~/mnt/alertmanager:/alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend