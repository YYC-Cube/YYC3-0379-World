version: "3.9"

networks:
  backend:
    driver: bridge

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:15-alpine
    platform: linux/arm64/v8
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: yyc3_gpt
    volumes:
      - /Users/my/mnt/postgres/data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U postgres || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    platform: linux/arm64/v8
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - /Users/my/mnt/redis/data:/data
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- Ollama ----------
  ollama:
    image: ollama/ollama:latest
    platform: linux/arm64/v8
    restart: always
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_PORT: ${OLLAMA_PORT}
      OLLAMA_MODELS: ${OLLAMA_MODELS}
    volumes:
      - /Users/my/mnt/models:/mnt/models
    ports:
      - "${OLLAMA_PORT}:${OLLAMA_PORT}"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider -O /dev/null http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------- Gateway ----------
  gateway:
    build: .
    platform: linux/arm64/v8
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - backend
    depends_on:
      - postgres
      - redis
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64/v8
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - backend

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana-oss:latest
    platform: linux/arm64/v8
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - backend

  # ---------- Loki (暂时禁用) ----------
  # loki:
  #   image: grafana/loki:2.9.2
  #   platform: linux/arm64/v8
  #   restart: always
  #   command: -config.file=/etc/loki/local-config.yaml
  #   volumes:
  #     - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
  #   ports:
  #     - "3100:3100"
  #   networks:
  #     - backend

  # ---------- Alertmanager ----------
  alertmanager:
    image: prom/alertmanager:latest
    platform: linux/arm64/v8
    restart: always
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/config.yml:ro
    ports:
      - "9093:9093"
    networks:
      - backend

volumes:
  grafana-data:
