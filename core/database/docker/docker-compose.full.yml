version: "3.9"

networks:
  backend:
    driver: bridge

services:
  # ---------- 1️⃣ PostgreSQL ----------
  postgres:
    image: postgres:15-alpine
    platform: linux/arm64/v8
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: yyc3_gpt
    volumes:
      - ~/mnt/postgres/pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---------- 2️⃣ Redis ----------
  redis:
    image: redis:7-alpine
    platform: linux/arm64/v8
    restart: always
    env_file:
      - ../.env
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ~/mnt/redis:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---------- 3️⃣ Ollama 本地 ----------
  ollama:
    image: ollama/ollama:latest
    platform: linux/arm64/v8
    restart: always
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_PORT: ${OLLAMA_PORT}
      OLLAMA_MODELS: ${OLLAMA_MODELS}
    volumes:
      - ~/mnt/models:/mnt/models
    ports:
      - "11435:11434"
    networks:
      - backend

  # ---------- 3.5️⃣ Node Exporter 系统监控 ----------
  node-exporter:
    image: prom/node-exporter:latest
    platform: linux/arm64/v8
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - backend

  # ---------- 3.6️⃣ PostgreSQL Exporter 数据库监控 ----------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    platform: linux/arm64/v8
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/yyc3_gpt?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - backend

  # ---------- 3.7️⃣ Redis Exporter 缓存监控 ----------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    platform: linux/arm64/v8
    restart: always
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - backend

  # ---------- 4️⃣ FastAPI 网关 ----------
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    platform: linux/arm64/v8
    restart: always
    env_file:
      - ../.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`api.0379.world`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls=true"
      - "traefik.http.routers.gateway.tls.certresolver=cloudflare"
      - "traefik.http.routers.gateway.middlewares=securityHeaders@file,rateLimiter@file,authBasic@file,circuitBreaker@file,requestLogging@file"
      - "traefik.http.services.gateway.loadbalancer.server.port=8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  # ---------- 5️⃣ Traefik 入口 ----------
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../config/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ../config/traefik/acme.json:/acme.json
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@0379.email}
    networks:
      - backend

  # ---------- 6️⃣ 监控栈 ----------
  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64/v8
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana-oss:latest
    platform: linux/arm64/v8
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - backend

  loki:
    image: grafana/loki:2.9.2
    platform: linux/arm64/v8
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    networks:
      - backend

  alertmanager:
    image: prom/alertmanager:latest
    platform: linux/arm64/v8
    restart: always
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/config.yml:ro
    ports:
      - "9093:9093"
    networks:
      - backend

volumes:
  grafana-data: