# HAProxy 负载均衡配置
# 文件: haproxy.cfg
# 说明: Gateway 双活负载均衡（yyc3-33 + yyc3-45）

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    retries 3
    option redispatch
    maxconn 2000

    # 健康检查
    option httpchk GET /health
    http-check expect status 200

# 统计页面
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
    stats auth admin:yyc3_admin_2026

# HTTP 前端
frontend http_front
    bind *:80
    mode http
    
    # 重定向到 HTTPS
    redirect scheme https code 301 if !{ ssl_fc }
    
    # ACL 规则
    acl is_api path_beg /v1/
    acl is_mcp path_beg /mcp/
    acl is_ws path_beg /ws/
    acl is_health path /health
    
    # 健康检查
    use_backend health_check if is_health
    
    # WebSocket
    use_backend ws_backend if is_ws
    
    # MCP
    use_backend mcp_backend if is_mcp
    
    # API
    use_backend api_backend if is_api
    
    # 默认
    default_backend api_backend

# HTTPS 前端
frontend https_front
    bind *:443 ssl crt /etc/haproxy/ssl/api.0379.world.pem alpn h2,http/1.1
    mode http
    
    # HTTP/2 支持
    option http-use-htx
    
    # 安全头
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # 速率限制
    http-request track-sc0 src table rate_limit
    http-request deny deny_status 429 if { sc_conn_cur(0) gt 100 }
    
    # ACL 规则
    acl is_api path_beg /v1/
    acl is_mcp path_beg /mcp/
    acl is_ws path_beg /ws/
    acl is_health path /health
    acl is_metrics path /metrics
    
    # 健康检查
    use_backend health_check if is_health
    
    # Prometheus 指标
    use_backend metrics_backend if is_metrics
    
    # WebSocket
    use_backend ws_backend if is_ws
    
    # MCP
    use_backend mcp_backend if is_mcp
    
    # API
    use_backend api_backend if is_api
    
    # 默认
    default_backend api_backend

# API 后端
backend api_backend
    mode http
    balance leastconn
    
    # 健康检查
    option httpchk GET /health
    http-check expect status 200
    
    # 会话保持（基于 Cookie）
    cookie SERVERID insert indirect nocache
    
    # 服务器列表
    server yyc3-33 yyc3-33:8000 weight 3 check cookie s1 maxconn 100
    server yyc3-45 yyc3-45:8002 weight 2 check cookie s2 maxconn 100 backup
    
    # 超时配置
    timeout connect 30s
    timeout server 60s
    
    # 重试配置
    retries 3
    option redispatch

# MCP 后端
backend mcp_backend
    mode http
    balance leastconn
    
    option httpchk GET /health
    http-check expect status 200
    
    server yyc3-33 yyc3-33:8000 weight 3 check maxconn 50
    server yyc3-45 yyc3-45:8002 weight 2 check maxconn 50 backup
    
    timeout connect 60s
    timeout server 120s

# WebSocket 后端
backend ws_backend
    mode http
    balance source
    
    # WebSocket 特定配置
    option http-server-close
    timeout tunnel 1h
    
    server yyc3-33 yyc3-33:8000 check maxconn 50
    server yyc3-45 yyc3-45:8002 check maxconn 50 backup

# 健康检查后端
backend health_check
    mode http
    server localhost 127.0.0.1:8080 check

# Prometheus 指标后端
backend metrics_backend
    mode http
    server yyc3-33 yyc3-33:8000 check maxconn 10
    server yyc3-45 yyc3-45:8002 check maxconn 10 backup

# 速率限制表
backend rate_limit
    stick-table type ip size 100k expire 30s store conn_cur,conn_rate(10s),http_req_rate(10s)
