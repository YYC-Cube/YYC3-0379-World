# Nginx 负载均衡配置
# 文件: nginx.conf
# 说明: Gateway 双活负载均衡（yyc3-33 + yyc3-45）

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr '
                    'response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # 上游服务器组 - Gateway 双活
    upstream gateway_cluster {
        # 负载均衡算法：最少连接
        least_conn;
        
        # yyc3-33 主节点
        server yyc3-33:8000 weight=3 max_fails=3 fail_timeout=30s;
        
        # yyc3-45 备用节点
        server yyc3-45:8002 weight=2 max_fails=3 fail_timeout=30s;
        
        # 健康检查（需要 nginx-plus 或第三方模块）
        # health_check interval=5s fails=3 passes=2;
        
        # 保持连接
        keepalive 32;
    }

    # 上游服务器组 - API 服务
    upstream api_cluster {
        least_conn;
        server yyc3-33:8000 weight=3;
        server yyc3-45:8002 weight=2;
        keepalive 32;
    }

    # 上游服务器组 - WebSocket
    upstream websocket_cluster {
        ip_hash;
        server yyc3-33:8000;
        server yyc3-45:8002;
    }

    # 速率限制区域
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 主服务器 - HTTP
    server {
        listen 80;
        server_name api.0379.world;
        
        # 重定向到 HTTPS
        return 301 https://$server_name$request_uri;
    }

    # 主服务器 - HTTPS
    server {
        listen 443 ssl http2;
        server_name api.0379.world;

        # SSL 证书
        ssl_certificate /etc/nginx/ssl/api.0379.world.crt;
        ssl_certificate_key /etc/nginx/ssl/api.0379.world.key;

        # 安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 健康检查端点（不经过负载均衡）
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Nginx 状态监控
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 192.168.3.0/24;
            allow 10.200.0.0/24;
            deny all;
        }

        # API 端点 - 负载均衡
        location /v1/ {
            # 速率限制
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            # 代理配置
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            
            # 请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时配置
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 缓冲配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # 错误处理
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        # MCP 端点
        location /mcp/ {
            proxy_pass http://gateway_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # WebSocket 端点
        location /ws/ {
            proxy_pass http://websocket_cluster;
            proxy_http_version 1.1;
            
            # WebSocket 特定配置
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
        }

        # Prometheus 指标
        location /metrics {
            proxy_pass http://gateway_cluster;
            proxy_set_header Host $host;
            access_log off;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Grafana 代理
    server {
        listen 443 ssl http2;
        server_name grafana.0379.world;

        ssl_certificate /etc/nginx/ssl/grafana.0379.world.crt;
        ssl_certificate_key /etc/nginx/ssl/grafana.0379.world.key;

        location / {
            proxy_pass http://yyc3-33:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Prometheus 代理
    server {
        listen 443 ssl http2;
        server_name prometheus.0379.world;

        ssl_certificate /etc/nginx/ssl/prometheus.0379.world.crt;
        ssl_certificate_key /etc/nginx/ssl/prometheus.0379.world.key;

        # 访问控制
        allow 192.168.3.0/24;
        allow 10.200.0.0/24;
        deny all;

        location / {
            proxy_pass http://yyc3-33:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
